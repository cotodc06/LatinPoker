<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Buscador de ID - Latin Poker</title>
    <style>
        :root { --primary: #2980b9; --secondary: #27ae60; --danger: #e74c3c; --dark: #2c3e50; }
        body { font-family: -apple-system, sans-serif; max-width: 800px; margin: auto; padding: 20px; background: #f4f7f6; }
        .caja-id { background: #fff3cd; border: 2px dashed #ffeeba; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .id-texto { font-family: monospace; font-size: 1.2em; font-weight: bold; color: #856404; word-break: break-all; }
        .caja { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; }
        .hidden { display: none !important; }
        #loginOverlay { position: fixed; inset: 0; background: var(--dark); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <h1>Latin Poker</h1>
        <p>Inicia sesión en Safari para ver el ID</p>
        <button onclick="document.getElementById('loginOverlay').classList.add('hidden')">VER ID</button>
    </div>

    <div class="caja-id">
        <p>Copia este código y dáselo a Gemini:</p>
        <div class="id-texto" id="mostrarID">Buscando ID...</div>
    </div>

    <div class="caja">
        <p>Una vez que tengas el ID, volveremos a la versión completa.</p>
    </div>

    <script>
        window.onload = () => {
            const binId = localStorage.getItem('latin_poker_bin_id');
            const el = document.getElementById('mostrarID');
            if (binId) {
                el.innerText = binId;
            } else {
                el.innerText = "No se encontró ID en este navegador. Ábrelo en el que tiene los datos.";
            }
        };
    </script>
</body>
</html>
